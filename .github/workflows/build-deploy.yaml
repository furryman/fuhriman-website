name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: furryman/fuhriman-website

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Audit dependencies for known vulnerabilities
        run: pnpm audit --audit-level=critical

      - name: Run ESLint
        run: pnpm lint

      - name: Run Stylelint
        run: pnpm stylelint

      - name: Check Prettier formatting
        run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Run TypeScript compiler
        run: pnpm exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Run tests with coverage
        run: pnpm coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Build Next.js app
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: pnpm e2e:install

      - name: Build Next.js app
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Build Next.js app
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm lighthouse

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: warn
          retention-days: 14

  docker:
    needs: [lint, typecheck, test, build, e2e, lighthouse]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Docker tag
        id: tag
        run: |
          TAG="ga-$(date +'%Y.%m.%d-%H%M')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          # Pin trivy binary to a version that still exists upstream — aquasecurity
          # purged v0.27.x–v0.69.1 from GitHub releases, breaking older trivy-action
          # versions whose hardcoded defaults pointed at deleted assets.
          version: v0.70.0
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

  deploy:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eks-helm-charts repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: furryman/eks-helm-charts
          token: ${{ secrets.GH_PAT }}
          path: eks-helm-charts

      - name: Update image tag in Helm values
        env:
          IMAGE_TAG: ${{ needs.docker.outputs.tag }}
        run: |
          yq -i ".image.tag = \"${IMAGE_TAG}\"" eks-helm-charts/fuhriman-chart/values.yaml
          echo "Updated values.yaml with tag: ${IMAGE_TAG}"

      - name: Commit and push changes
        env:
          IMAGE_TAG: ${{ needs.docker.outputs.tag }}
        run: |
          cd eks-helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fuhriman-chart/values.yaml
          git commit -m "Update fuhriman-website image to ${IMAGE_TAG}"
          git push
