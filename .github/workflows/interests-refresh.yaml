name: Refresh Interests (Spotify + Steam)

on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Mondays at 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Use GH_PAT so the subsequent `git push` triggers the build-deploy
          # workflow. Pushes made with the default GITHUB_TOKEN do NOT trigger
          # other workflows (GitHub's loop-prevention safeguard).
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup

      - name: Refresh Spotify top artists
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: pnpm tsx scripts/refresh-spotify.ts
        continue-on-error: true

      - name: Refresh Steam recent games
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID_64: ${{ secrets.STEAM_ID_64 }}
          STEAM_BLOCKLIST_APPIDS: ${{ secrets.STEAM_BLOCKLIST_APPIDS }}
        run: pnpm tsx scripts/refresh-steam.ts
        continue-on-error: true

      - name: Commit changes if any
        run: |
          if [[ -z "$(git status --porcelain public/)" ]]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/spotify-top.json public/steam-recent.json
          git commit -m "chore(data): refresh interests JSON"
          # Retry on push race — rebase onto whatever landed since checkout
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed, pulling --rebase and retrying…"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts"
          exit 1
